@if (authService.isLoggedIn()) {
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" routerLink="/dashboard">
        <i class="bi bi-building me-2"></i>Lodge Manager
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
              (click)="menuOpen = !menuOpen">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" [class.show]="menuOpen" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" routerLink="/dashboard" routerLinkActive="active" (click)="menuOpen = false">
              <i class="bi bi-grid me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/bookings/new" routerLinkActive="active" (click)="menuOpen = false">
              <i class="bi bi-plus-circle me-1"></i>New Booking
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/bookings" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="menuOpen = false">
              <i class="bi bi-list-ul me-1"></i>Bookings
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/rooms" routerLinkActive="active" (click)="menuOpen = false">
              <i class="bi bi-door-open me-1"></i>Rooms
            </a>
          </li>
          @if (authService.isSuperAdmin()) {
            <li class="nav-item">
              <a class="nav-link" routerLink="/employees" routerLinkActive="active" (click)="menuOpen = false">
                <i class="bi bi-people me-1"></i>Employees
              </a>
            </li>
          }
        </ul>
        <div class="d-flex align-items-center">
          <span class="text-light me-3">
            <i class="bi bi-person-circle me-1"></i>{{ authService.getUsername() }}
            <small class="opacity-75">({{ authService.getRole() }})</small>
          </span>
          <button class="btn btn-outline-light btn-sm" (click)="authService.logout()">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
          </button>
        </div>
      </div>
    </div>
  </nav>
}
