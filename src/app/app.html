@if (authService.isLoggedIn()) {
  <app-header
    [logoSrc]="'favicon.ico'"
    [title]="'Royal Guest House ( Manager )'"
    [variant]="'primary'"
    [navItems]="navItems"
    [showProfile]="true"
    [profileName]="authService.getUsername() + ' (' + authService.getRole() + ')'"
    [profileMenuItems]="profileMenuItems"
    (navItemClicked)="onNavItemClick($event)"
    (profileMenuItemClicked)="onProfileMenuItemClick($event)"
  >
    <button class="mobile-menu-btn" (click)="toggleSidenav()" aria-label="Toggle menu">
      <i class="bi bi-list"></i>
    </button>
  </app-header>

  <app-sidenav
    [navItems]="sidenavItems"
    [isMobileOpen]="isSidenavOpen"
    [isCollapsed]="isSidenavCollapsed"
    (navItemClicked)="onSideNavItemClick($event)"
    (toggleCollapse)="toggleSidenavCollapse()"
  ></app-sidenav>

  @if (isSidenavOpen) {
    <div class="sidenav-overlay" (click)="toggleSidenav()"></div>
  }

  <div class="main-content" [class.sidenav-collapsed]="isSidenavCollapsed">
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
      @for (notification of notifications; track $index) {
        <div class="alert alert-{{ notification.type === 'error' ? 'danger' : notification.type }} alert-dismissible fade show" role="alert">
          {{ notification.message }}
        </div>
      }
    </div>

    <div class="container-fluid p-3 p-md-4">
      <router-outlet></router-outlet>
    </div>
  </div>
} @else {
  <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    @for (notification of notifications; track $index) {
      <div class="alert alert-{{ notification.type === 'error' ? 'danger' : notification.type }} alert-dismissible fade show" role="alert">
        {{ notification.message }}
      </div>
    }
  </div>

  <router-outlet></router-outlet>
}
